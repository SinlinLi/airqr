<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline QR Generator</title>
<meta name="description" content="Secure, offline QR code generator. All data stays in your browser.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #e5e5e5; --muted: #737373; --accent: #10b981; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
.subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 480px; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
textarea { width: 100%; min-height: 120px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.75rem; font-size: 0.95rem; font-family: 'SF Mono', 'Fira Code', monospace; resize: vertical; outline: none; transition: border-color 0.2s; }
textarea:focus { border-color: var(--accent); }
.row { display: flex; gap: 0.75rem; }
.row > * { flex: 1; }
select, input[type="number"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.6rem 0.75rem; font-size: 0.9rem; outline: none; }
select:focus, input[type="number"]:focus { border-color: var(--accent); }
.actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
button { flex: 1; padding: 0.7rem; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
button:hover { opacity: 0.85; }
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--border); color: var(--text); }
.output { margin-top: 1.5rem; text-align: center; }
.qr-container { display: inline-block; background: #fff; padding: 16px; border-radius: 8px; }
.qr-container canvas { display: block; }
.stats { margin-top: 0.75rem; font-size: 0.8rem; color: var(--muted); }
.badge { display: inline-flex; align-items: center; gap: 0.4rem; background: #052e16; color: var(--accent); font-size: 0.75rem; padding: 0.3rem 0.7rem; border-radius: 20px; margin-top: 1.5rem; }
.badge::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.char-count { text-align: right; font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
.hidden { display: none; }
footer { margin-top: 2rem; font-size: 0.75rem; color: var(--muted); text-align: center; }
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<h1>Offline QR Generator</h1>
<p class="subtitle">All data stays in your browser. Zero network requests.</p>

<div class="card">
  <div class="field">
    <label>Data</label>
    <textarea id="input" placeholder="Paste text, URL, private key, seed phrase..." spellcheck="false" autocomplete="off"></textarea>
    <div class="char-count"><span id="charCount">0</span> chars &middot; <span id="byteCount">0</span> bytes</div>
  </div>

  <div class="row">
    <div class="field">
      <label>Error Correction</label>
      <select id="ecLevel">
        <option value="L">L — 7% recovery</option>
        <option value="M" selected>M — 15% recovery</option>
        <option value="Q">Q — 25% recovery</option>
        <option value="H">H — 30% recovery</option>
      </select>
    </div>
    <div class="field">
      <label>Module Size</label>
      <input type="number" id="cellSize" value="8" min="2" max="20">
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="generate()">Generate</button>
    <button class="btn-secondary" id="downloadBtn" onclick="download()" disabled>Download PNG</button>
  </div>

  <div class="output hidden" id="output">
    <div class="qr-container" id="qrContainer"></div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<div class="badge">Offline &amp; Secure — CSP blocks all external connections</div>

<footer>
  <p>QR lib: <a href="https://github.com/nickelc/qrloop" target="_blank">qrcode-generator</a> by Kazuhiko Arase (MIT)</p>
  <p>Source: <a href="https://github.com/nickelc/qrloop" id="repoLink" target="_blank">GitHub</a></p>
</footer>

<script src="qrcode.min.js"></script>
<script>
var inputEl = document.getElementById('input');
var charCountEl = document.getElementById('charCount');
var byteCountEl = document.getElementById('byteCount');

inputEl.addEventListener('input', function() {
  charCountEl.textContent = this.value.length;
  byteCountEl.textContent = new Blob([this.value]).size;
});

// auto-generate on Enter (Ctrl/Cmd+Enter)
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    generate();
  }
});

function generate() {
  var text = inputEl.value;
  if (!text) return;

  var ecLevel = document.getElementById('ecLevel').value;
  var cellSize = parseInt(document.getElementById('cellSize').value) || 8;

  // auto-detect minimum QR version
  var qr = null;
  for (var typeNum = 1; typeNum <= 40; typeNum++) {
    try {
      qr = qrcode(typeNum, ecLevel);
      qr.addData(text);
      qr.make();
      break;
    } catch (e) {
      qr = null;
    }
  }

  if (!qr) {
    alert('Data too large for QR code. Try reducing text or lowering error correction level.');
    return;
  }

  var container = document.getElementById('qrContainer');
  container.innerHTML = '';

  var count = qr.getModuleCount();
  var size = count * cellSize;
  var canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);

  ctx.fillStyle = '#000000';
  for (var row = 0; row < count; row++) {
    for (var col = 0; col < count; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
      }
    }
  }

  container.appendChild(canvas);

  var outputEl = document.getElementById('output');
  outputEl.classList.remove('hidden');

  var bytes = new Blob([text]).size;
  document.getElementById('stats').textContent =
    'Version ' + typeNum + ' (' + count + '\u00d7' + count + ') \u00b7 EC=' + ecLevel + ' \u00b7 ' + bytes + ' bytes \u00b7 ' + size + '\u00d7' + size + 'px';

  document.getElementById('downloadBtn').disabled = false;
}

function download() {
  var canvas = document.querySelector('#qrContainer canvas');
  if (!canvas) return;
  var a = document.createElement('a');
  a.download = 'qrcode.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>

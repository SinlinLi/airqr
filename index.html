<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirQR — Air-Gapped QR Tool</title>
<meta name="description" content="AirQR: Secure, air-gapped QR code generator and scanner. All data stays in your browser. Zero network requests.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:;">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #e5e5e5; --muted: #737373; --accent: #10b981; --danger: #ef4444; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
.subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.tab { padding: 0.6rem 1.5rem; font-size: 0.9rem; font-weight: 500; cursor: pointer; background: transparent; color: var(--muted); border: none; transition: all 0.2s; }
.tab:hover { color: var(--text); }
.tab.active { background: var(--accent); color: #000; }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 480px; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
textarea { width: 100%; min-height: 120px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.75rem; font-size: 0.95rem; font-family: 'SF Mono', 'Fira Code', monospace; resize: vertical; outline: none; transition: border-color 0.2s; }
textarea:focus { border-color: var(--accent); }
.row { display: flex; gap: 0.75rem; }
.row > * { flex: 1; }
select, input[type="number"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.6rem 0.75rem; font-size: 0.9rem; outline: none; }
select:focus, input[type="number"]:focus { border-color: var(--accent); }
.actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
button { flex: 1; padding: 0.7rem; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
button:hover { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.output { margin-top: 1.5rem; text-align: center; }
.qr-container { display: inline-block; background: #fff; padding: 16px; border-radius: 8px; }
.qr-container canvas { display: block; }
.stats { margin-top: 0.75rem; font-size: 0.8rem; color: var(--muted); }
.char-count { text-align: right; font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
.toggle-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.85rem; cursor: pointer; user-select: none; color: var(--muted); }
.toggle-row input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
.toggle-row.active { color: var(--text); }
.split-output { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; }
.split-part { text-align: center; }
.split-part .part-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; }
.split-part .qr-container { padding: 10px; }
.hidden { display: none; }

/* Scanner */
.scanner-area { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
.scanner-area video { width: 100%; display: block; border-radius: 8px; }
.scanner-area canvas { display: none; }
.scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; height: 0; padding-bottom: 60%; border: 2px solid var(--accent); border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.4); pointer-events: none; }
.drop-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 2rem; text-align: center; color: var(--muted); cursor: pointer; transition: border-color 0.2s; }
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); color: var(--text); }
.drop-zone input { display: none; }
.result-box { margin-top: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; word-break: break-all; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9rem; text-align: left; max-height: 200px; overflow-y: auto; user-select: all; }
.result-actions { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
.scan-status { margin-top: 0.75rem; font-size: 0.8rem; color: var(--muted); text-align: center; }
.scan-status.success { color: var(--accent); }

/* Badge & Footer */
.badge { display: inline-flex; align-items: center; gap: 0.4rem; background: #052e16; color: var(--accent); font-size: 0.75rem; padding: 0.3rem 0.7rem; border-radius: 20px; margin-top: 1.5rem; }
.badge::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
footer { margin-top: 1.5rem; font-size: 0.75rem; color: var(--muted); text-align: center; line-height: 1.6; }
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<h1>AirQR</h1>
<p class="subtitle">Air-gapped QR tool. All data stays in your browser.</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('generate')">Generate</button>
  <button class="tab" onclick="switchTab('scan')">Scan</button>
</div>

<!-- Generate Tab -->
<div class="card" id="generateTab">
  <div class="field">
    <label>Data</label>
    <textarea id="input" placeholder="Paste text, URL, private key, seed phrase..." spellcheck="false" autocomplete="off"></textarea>
    <div class="char-count"><span id="charCount">0</span> chars &middot; <span id="byteCount">0</span> bytes</div>
  </div>
  <div class="row">
    <div class="field">
      <label>Error Correction</label>
      <select id="ecLevel">
        <option value="L">L — 7%</option>
        <option value="M" selected>M — 15%</option>
        <option value="Q">Q — 25%</option>
        <option value="H">H — 30%</option>
      </select>
    </div>
    <div class="field">
      <label>Module Size</label>
      <input type="number" id="cellSize" value="8" min="2" max="20">
    </div>
  </div>
  <label class="toggle-row" id="splitToggle">
    <input type="checkbox" id="splitMode"> Split into 3 parts (random cut, min 15% each)
  </label>
  <div class="actions">
    <button class="btn-primary" onclick="generate()">Generate</button>
    <button class="btn-secondary" id="downloadBtn" onclick="downloadQR()" disabled>Download PNG</button>
  </div>
  <div class="output hidden" id="genOutput">
    <div class="qr-container" id="qrContainer"></div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="split-output hidden" id="splitOutput"></div>
</div>

<!-- Scan Tab -->
<div class="card hidden" id="scanTab">
  <!-- Camera -->
  <div class="field">
    <label>Camera</label>
    <div class="scanner-area hidden" id="scannerArea">
      <video id="scanVideo" playsinline></video>
      <canvas id="scanCanvas"></canvas>
      <div class="scanner-overlay"></div>
    </div>
    <div class="actions" id="cameraActions">
      <button class="btn-primary" id="cameraBtn" onclick="toggleCamera()">Start Camera</button>
    </div>
  </div>

  <!-- File Upload -->
  <div class="field">
    <label>Or upload image</label>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*">
      Drop image here or click to select
    </div>
  </div>

  <!-- Result -->
  <div class="hidden" id="scanResult">
    <div class="field">
      <label>Result</label>
      <div class="result-box" id="resultText"></div>
      <div class="result-actions">
        <button class="btn-primary" onclick="copyResult()">Copy</button>
        <button class="btn-secondary" onclick="clearResult()">Clear</button>
      </div>
    </div>
  </div>
  <div class="scan-status" id="scanStatus"></div>
</div>

<div class="badge">Offline &amp; Secure — CSP blocks all external connections</div>

<footer>
  <p>Generate: <a href="https://github.com/nickelc/qrloop">qrcode-generator</a> (MIT) &middot; Scan: <a href="https://github.com/nickelc/qrloop">jsQR</a> (Apache-2.0)</p>
  <p><a href="https://github.com/SinlinLi/airqr">Source on GitHub</a></p>
</footer>

<script src="qrcode.min.js"></script>
<script src="jsqr.min.js"></script>
<script>
// --- DOM refs (cached once, no repeated getElementById) ---
var $ = document.getElementById.bind(document);
var refs = {
  input: $('input'), charCount: $('charCount'), byteCount: $('byteCount'),
  ecLevel: $('ecLevel'), cellSize: $('cellSize'), downloadBtn: $('downloadBtn'),
  genOutput: $('genOutput'), qrContainer: $('qrContainer'), stats: $('stats'),
  generateTab: $('generateTab'), scanTab: $('scanTab'),
  scannerArea: $('scannerArea'), scanVideo: $('scanVideo'), scanCanvas: $('scanCanvas'),
  cameraBtn: $('cameraBtn'), fileInput: $('fileInput'), dropZone: $('dropZone'),
  scanResult: $('scanResult'), resultText: $('resultText'), scanStatus: $('scanStatus')
};

refs.splitMode = $('splitMode');
refs.splitOutput = $('splitOutput');
refs.splitToggle = $('splitToggle');

var cameraSupported = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
var videoStream = null;
var animFrame = null;

refs.splitMode.addEventListener('change', function() {
  refs.splitToggle.classList.toggle('active', this.checked);
});

// --- Tabs ---
function switchTab(tab) {
  var isGen = tab === 'generate';
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', isGen ? i === 0 : i === 1);
  });
  refs.generateTab.classList.toggle('hidden', !isGen);
  refs.scanTab.classList.toggle('hidden', isGen);
  if (isGen) stopCamera();
}

// --- Generate ---
refs.input.addEventListener('input', function() {
  refs.charCount.textContent = this.value.length;
  refs.byteCount.textContent = new Blob([this.value]).size;
});

refs.input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); generate(); }
});

function findMinQR(text, ecLevel) {
  for (var v = 1; v <= 40; v++) {
    try {
      var qr = qrcode(v, ecLevel);
      qr.addData(text);
      qr.make();
      return { qr: qr, version: v };
    } catch (e) {}
  }
  return null;
}

function renderQR(qr, cellSize) {
  var count = qr.getModuleCount();
  var size = count * cellSize;
  var canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000';
  for (var r = 0; r < count; r++)
    for (var c = 0; c < count; c++)
      if (qr.isDark(r, c))
        ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
  return canvas;
}

function splitText3(text) {
  // Random split: each part gets at least 15%, remaining 55% distributed randomly.
  var len = text.length;
  var base = Math.max(1, Math.floor(len * 0.15));
  var extra = len - base * 3;
  // Distribute extra chars randomly among 3 parts (simplex sampling)
  var r1 = Math.floor(Math.random() * (extra + 1));
  var r2 = Math.floor(Math.random() * (extra - r1 + 1));
  var sizes = [base + r1, base + r2, base + (extra - r1 - r2)];
  return [text.slice(0, sizes[0]), text.slice(sizes[0], sizes[0] + sizes[1]), text.slice(sizes[0] + sizes[1])];
}

function generate() {
  var text = refs.input.value;
  if (!text) return;

  var ecLevel = refs.ecLevel.value;
  var cellSize = parseInt(refs.cellSize.value) || 8;

  if (refs.splitMode.checked && text.length >= 3) {
    generateSplit(text, ecLevel, cellSize);
  } else {
    generateSingle(text, ecLevel, cellSize);
  }
}

function generateSingle(text, ecLevel, cellSize) {
  refs.splitOutput.classList.add('hidden');
  var result = findMinQR(text, ecLevel);
  if (!result) { alert('Data too large for QR code.'); return; }

  var canvas = renderQR(result.qr, cellSize);
  var count = result.qr.getModuleCount();

  refs.qrContainer.innerHTML = '';
  refs.qrContainer.appendChild(canvas);
  refs.genOutput.classList.remove('hidden');
  refs.stats.textContent = 'Version ' + result.version + ' (' + count + '\u00d7' + count
    + ') \u00b7 EC=' + ecLevel + ' \u00b7 ' + new Blob([text]).size
    + ' bytes \u00b7 ' + canvas.width + '\u00d7' + canvas.height + 'px';
  refs.downloadBtn.disabled = false;
}

function generateSplit(text, ecLevel, cellSize) {
  refs.genOutput.classList.add('hidden');
  var parts = splitText3(text);
  refs.splitOutput.innerHTML = '';

  for (var i = 0; i < 3; i++) {
    var result = findMinQR(parts[i], ecLevel);
    if (!result) { alert('Part ' + (i + 1) + ' too large for QR code.'); return; }
    var canvas = renderQR(result.qr, cellSize);
    var div = document.createElement('div');
    div.className = 'split-part';
    var label = document.createElement('div');
    label.className = 'part-label';
    label.textContent = 'Part ' + (i + 1) + ' (' + parts[i].length + ' chars)';
    var wrap = document.createElement('div');
    wrap.className = 'qr-container';
    wrap.appendChild(canvas);
    div.appendChild(label);
    div.appendChild(wrap);
    refs.splitOutput.appendChild(div);
  }

  refs.splitOutput.classList.remove('hidden');
  refs.downloadBtn.disabled = false;
}

function downloadQR() {
  if (refs.splitMode.checked) {
    // Download all 3 parts
    var canvases = refs.splitOutput.querySelectorAll('canvas');
    canvases.forEach(function(canvas, i) {
      var a = document.createElement('a');
      a.download = 'qrcode-part' + (i + 1) + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  } else {
    var canvas = refs.qrContainer.querySelector('canvas');
    if (!canvas) return;
    var a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
}

// --- Camera ---
// Camera requires HTTPS (or localhost). On plain HTTP, navigator.mediaDevices is undefined.
// Instead of silently failing, we tell the user why.

function startCamera() {
  if (!cameraSupported) {
    setStatus('Camera requires HTTPS. Try localhost or add a certificate.');
    return;
  }
  var btn = refs.cameraBtn;
  btn.textContent = 'Starting...';
  btn.disabled = true;

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
  }).then(function(stream) {
    videoStream = stream;
    refs.scanVideo.srcObject = stream;
    refs.scanVideo.play();
    refs.scannerArea.classList.remove('hidden');
    btn.textContent = 'Stop Camera';
    btn.disabled = false;
    btn.className = 'btn-danger';
    setStatus('Scanning...');
    scanLoop();
  }).catch(function(err) {
    btn.textContent = 'Start Camera';
    btn.disabled = false;
    setStatus('Camera error: ' + err.message);
  });
}

function stopCamera() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (videoStream) {
    videoStream.getTracks().forEach(function(t) { t.stop(); });
    videoStream = null;
  }
  refs.scanVideo.srcObject = null;
  refs.scannerArea.classList.add('hidden');
  refs.cameraBtn.textContent = 'Start Camera';
  refs.cameraBtn.className = 'btn-primary';
  refs.cameraBtn.disabled = false;
}

function toggleCamera() {
  videoStream ? stopCamera() : startCamera();
}

function scanLoop() {
  if (!videoStream) return;
  var video = refs.scanVideo;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    var code = decodeFromVideo(video);
    if (code) { showResult(code); stopCamera(); return; }
  }
  animFrame = requestAnimationFrame(scanLoop);
}

function decodeFromVideo(video) {
  var canvas = refs.scanCanvas;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var result = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
  return result ? result.data : null;
}

// --- File decode ---
function decodeFromImage(file) {
  // file.type can be empty on some mobile browsers, so only reject known non-image types
  if (file.type && !file.type.startsWith('image/')) { setStatus('Not an image file.'); return; }
  setStatus('Decoding...');
  var url = URL.createObjectURL(file);
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var result = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
    result ? showResult(result.data) : setStatus('No QR code found in image.');
    URL.revokeObjectURL(url);
  };
  img.onerror = function() {
    setStatus('Failed to load image.');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

refs.fileInput.addEventListener('change', function() {
  if (this.files[0]) decodeFromImage(this.files[0]);
});

refs.dropZone.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('dragover'); });
refs.dropZone.addEventListener('dragleave', function() { this.classList.remove('dragover'); });
refs.dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  this.classList.remove('dragover');
  if (e.dataTransfer.files[0]) decodeFromImage(e.dataTransfer.files[0]);
});

// --- Result ---
function showResult(text) {
  refs.resultText.textContent = text;
  refs.scanResult.classList.remove('hidden');
  setStatus('QR code decoded!', true);
}

function copyResult() {
  var text = refs.resultText.textContent;
  try {
    // clipboard API may exist but reject on HTTP (non-secure context)
    navigator.clipboard.writeText(text).then(
      function() { setStatus('Copied!', true); },
      function() { selectResultText(); }
    );
  } catch (e) {
    selectResultText();
  }
}

function selectResultText() {
  var range = document.createRange();
  range.selectNodeContents(refs.resultText);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  setStatus('Select and copy manually (Ctrl+C).');
}

function clearResult() {
  refs.resultText.textContent = '';
  refs.scanResult.classList.add('hidden');
  setStatus('');
  refs.fileInput.value = '';
}

function setStatus(msg, success) {
  refs.scanStatus.textContent = msg;
  refs.scanStatus.className = 'scan-status' + (success ? ' success' : '');
}

// Init: disable camera button if not supported
if (!cameraSupported) {
  refs.cameraBtn.textContent = 'Camera (HTTPS required)';
  refs.cameraBtn.className = 'btn-secondary';
}
</script>
</body>
</html>
